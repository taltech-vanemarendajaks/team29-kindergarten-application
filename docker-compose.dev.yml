version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: kindergarten-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kindergarten
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: kindergarten-backend-dev
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: kindergarten-frontend-dev
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4000"
    ports:
      - "3000:3000"

volumes:
  postgres_dev_data:
