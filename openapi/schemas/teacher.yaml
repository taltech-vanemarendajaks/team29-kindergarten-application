TeacherResponse:
  type: object
  required: [id, tenantId, firstName, lastName, createdAt, updatedAt]
  properties:
    id:
      type: integer
      format: int64
    tenantId:
      type: integer
      format: int64
    firstName:
      type: string
    lastName:
      type: string

CreateTeacherRequest:
  type: object
  required: [firstName, lastName]
  properties:
    firstName:
      type: string
    lastName:
      type: string

UpdateTeacherRequest:
  type: object
  required: [firstName, lastName]
  properties:
    firstName:
      type: string
    lastName:
      type: string