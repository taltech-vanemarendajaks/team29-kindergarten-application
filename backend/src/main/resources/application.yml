spring:
  application:
    name: backend

  config:
    import: optional:classpath:.env.properties

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET} # secret should be more than 32 chars
  expiration: 86400000 # 24 hours

cors:
  allowed-origins: "http://localhost:3000,https://kindergarten-team29.ddns.net"

logging:
  level:
    root: INFO
    com.team29.kindergarten: DEBUG