spring:
  application:
    name: backend

  dotenv:
    path: ../.env

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  jwt:
    secret: ${JWT_SECRET} # secret should be more than 32 chars
    expiration: 86400000 # 24 hours

logging:
  level:
    root: INFO
    com.team29.kindergarten: DEBUG