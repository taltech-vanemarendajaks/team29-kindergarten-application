name: Fullstack CI/CD

on:
  push:
    branches: ["1-vz-devops-cicd-basic-pipeline-github"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --------------------------
      # Build & Push Backend Image
      # --------------------------
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build backend JAR
        run: |
          cd backend
          ./gradlew build -x test

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/kindergarten-backend:latest ./backend

      - name: Push backend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/kindergarten-backend:latest

      # --------------------------
      # Build & Push Frontend Image
      # --------------------------
      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/kindergarten-frontend:latest \
            ./frontend

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/kindergarten-frontend:latest

      # --------------------------
      # Upload docker-compose.yml
      # --------------------------
      - name: Upload docker-compose.yml
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.SSH_USER }}/kindergarten/"

      # --------------------------
      # Deploy to Server
      # --------------------------
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            export POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            export POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export DOCKERHUB_TOKEN=${{ secrets.DOCKERHUB_TOKEN }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            export APP_CORS_ALLOWED_ORIGINS=${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
            
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/kindergarten-backend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/kindergarten-frontend:latest
            
            cd /home/${{ secrets.SSH_USER }}/kindergarten
            docker compose down
            docker compose up -d
